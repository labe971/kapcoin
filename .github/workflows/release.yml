
name: Build Windows Daemon and CLI
on: [workflow_dispatch, push]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils curl git g++-mingw-w64-x86-64-posix

      - name: Fix Source Code
        run: |
          # Correzione bdb.cpp
          sed -i 's/fs::copy_options::overwrite_existing/fs::copy_option::overwrite_if_exists/g' src/wallet/bdb.cpp
          sed -i 's/fs::copy_options/fs::copy_option/g' src/wallet/bdb.cpp || true
          # Correzione fs.cpp
          sed -i '1i #include <limits>' src/fs.cpp

      - name: Build Kapcoin
        run: |
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
          cd depends
          make HOST=x86_64-w64-mingw32 NO_QT=1 NO_UPNP=1 NO_ZMQ=1 -j$(nproc)
          cd ..
          ./autogen.sh
          ./configure --prefix=`pwd`/depends/x86_64-w64-mingw32 --without-gui --without-miniupnpc --disable-tests --disable-bench --disable-zmq --enable-static CXXFLAGS="-DBOOST_NO_CXX11_SCOPED_ENUMS"
          make -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kapcoin-windows-tools
          path: |
            src/kapcoind.exe
            src/kapcoin-cli.exe
